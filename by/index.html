<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Triangle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: lightgrey;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

    .td {
        transform: rotateY(0deg);
        font: 5vw Ivar Text, sans-serif;
        letter-spacing: -0.03em;
        transition: all 0.5s ease;
    }

    .td:hover{  
        transform: rotateX(10deg) rotateY(05deg) rotateZ(45deg);
        transition: all 0.5s ease;

    }
              

    /* @keyframes rotate {
        0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        50% { transform: rotateX(15deg) rotateY(45deg) rotateZ(15deg); }
        100% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    } */
    </style>
</head>
<body>
<div class="td">
    Site Sessions 001 <br>Bla.bla.
</div>
</body>
</html>
